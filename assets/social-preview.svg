<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#161616"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f62fe;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#8a3ffc;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- IBM 8-bar logo (top left) -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="8" height="32" fill="#0f62fe"/>
    <rect x="12" y="0" width="8" height="32" fill="#0f62fe"/>
    <rect x="24" y="0" width="16" height="32" fill="#0f62fe"/>
    <rect x="44" y="0" width="8" height="32" fill="#0f62fe"/>
    <rect x="56" y="0" width="8" height="32" fill="#0f62fe"/>
    <rect x="68" y="0" width="16" height="32" fill="#0f62fe"/>
    <rect x="88" y="0" width="8" height="32" fill="#0f62fe"/>
    <rect x="100" y="0" width="8" height="32" fill="#0f62fe"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="260" font-family="'IBM Plex Sans', sans-serif" font-size="72" font-weight="600" fill="#ffffff" text-anchor="middle">
    The wellness project
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="330" font-family="'IBM Plex Sans', sans-serif" font-size="32" font-weight="400" fill="#c6c6c6" text-anchor="middle">
    Building a healthier, more connected workplace
  </text>
  
  <!-- Wellness pillars -->
  <g transform="translate(300, 400)">
    <!-- Mind -->
    <circle cx="0" cy="0" r="40" fill="#0f62fe" opacity="0.2"/>
    <text x="0" y="8" font-family="'IBM Plex Sans', sans-serif" font-size="20" font-weight="500" fill="#78a9ff" text-anchor="middle">Mind</text>
    
    <!-- Body -->
    <circle cx="200" cy="0" r="40" fill="#42be65" opacity="0.2"/>
    <text x="200" y="8" font-family="'IBM Plex Sans', sans-serif" font-size="20" font-weight="500" fill="#42be65" text-anchor="middle">Body</text>
    
    <!-- Belonging -->
    <circle cx="400" cy="0" r="40" fill="#8a3ffc" opacity="0.2"/>
    <text x="400" y="8" font-family="'IBM Plex Sans', sans-serif" font-size="20" font-weight="500" fill="#be95ff" text-anchor="middle">Belonging</text>
    
    <!-- Growth -->
    <circle cx="600" cy="0" r="40" fill="#ff7eb6" opacity="0.2"/>
    <text x="600" y="8" font-family="'IBM Plex Sans', sans-serif" font-size="20" font-weight="500" fill="#ff7eb6" text-anchor="middle">Growth</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="580" font-family="'IBM Plex Sans', sans-serif" font-size="18" font-weight="400" fill="#8d8d8d" text-anchor="middle">
    ISDL Design and Content Team
  </text>
</svg>

<!-- Made with Bob -->
